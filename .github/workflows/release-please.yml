name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

# Authenticate via a dedicated GitHub App (token minted at job time) rather
# than GITHUB_TOKEN. Events generated by the default GITHUB_TOKEN do not
# trigger downstream workflows, so the tag release-please pushes would never
# run release.yml (PyPI publish). App-minted tokens are treated as first-class
# actors and do trigger downstream workflows.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RELEASE_PLEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please bumps the version in pyproject.toml but not uv.lock, so
      # the lock's own-project version goes stale and `uv sync --locked` fails
      # on the release PR (and on main once it merges). Regenerate the lock on
      # the release branch whenever a release PR is open. The push here does not
      # re-trigger this workflow (it fires only on push to main), but it does
      # re-run CI on the PR.
      - if: ${{ steps.release.outputs.pr }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.app-token.outputs.token }}

      - if: ${{ steps.release.outputs.pr }}
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - if: ${{ steps.release.outputs.pr }}
        name: Sync uv.lock with the bumped version
        run: |
          uv lock
          if ! git diff --quiet uv.lock; then
            git config user.name "release-please[bot]"
            git config user.email "release-please[bot]@users.noreply.github.com"
            git commit -am "chore: sync uv.lock with release version"
            git push
          fi
