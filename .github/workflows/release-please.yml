name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

# Authenticate via a dedicated GitHub App (token minted at job time) rather
# than GITHUB_TOKEN. Events generated by the default GITHUB_TOKEN do not
# trigger downstream workflows, so the tag release-please pushes would never
# run release.yml (PyPI publish). App-minted tokens are treated as first-class
# actors and do trigger downstream workflows.
permissions: {}

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
